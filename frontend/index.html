<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <!-- PNG önce: modern tarayıcılar transparent kanalı düzgün render eder -->
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />
    <!-- ICO en son (Internet Explorer fallback'i için) -->
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fallback title (JS yüklenene kadar). Rota-bazlı title/canonical/og/description
         React tarafında react-helmet-async ile basılır (bkz. components/Seo.jsx) —
         burada TEKRAR tanımlanMAZ, yoksa çift canonical/og oluşur. -->
    <title>UniSense — 2026 Tercih Robotu | YKS, DGS, KPSS</title>
    <meta name="keywords" content="2026 tercih robotu, YKS 2026, üniversite tercih, taban puanlar, başarı sıralaması, tercih asistanı, KPSS kadro arama, KPSS taban puanları, DGS puan hesaplama, YKS puan hesaplama, bölüm tanıtımları" />

    <!-- Rotadan bağımsız SABİT Open Graph alanları (helmet bunları set etmez) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="UniSense" />
    <meta property="og:image" content="https://www.unisense.com.tr/logo.png" />
    <meta property="og:locale" content="tr_TR" />
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="theme-color" content="#1e1b4b" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
