name: TUS/DUS Data Sync

# TUS (yılda 2 dönem) + DUS yerleştirme sonuçları ÖSYM'de dönemsel yayınlanır;
# takvim düzensiz olduğundan 2 ayda bir dener + istenince elle tetiklenir.
# Scraper idempotent: veri değişmediyse commit atlanır.
# Manuel: GitHub Actions → "TUS/DUS Data Sync" → Run workflow.
#
# Veri küçük (~1.2 MB toplam) ve RAG index'ini ETKİLEMEZ → sadece
# tus_rankings.json + dus_rankings.json commit'lenir, embed/index rebuild yok.

on:
  schedule:
    - cron: '0 6 5 1,3,5,7,9,11 *'  # 2 ayda bir, ayın 5'i 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps (requests + PyMuPDF)
        run: python -m pip install --upgrade pip requests PyMuPDF

      - name: Scrape — TUS/DUS ÖSYM min/max yerleşme puanları
        working-directory: backend
        run: python -m unisense.infrastructure.scrapers.tusdus_scraper

      - name: Commit TUS/DUS data update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/data/processed/tus_rankings.json backend/data/processed/dus_rankings.json
          if git diff --staged --quiet; then
            echo "Hiç değişiklik yok, commit atlandı"
          else
            git commit -m "chore(data): TUS/DUS taban puan verisi güncellendi ($(date -u +%Y-%m-%d))"
            git push
          fi
