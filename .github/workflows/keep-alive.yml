name: Keep Backend Warm

# Render FREE tier 15 dk boşta kalınca uyur → Bölümler/Takvim gibi sayfalar
# soğuk başlangıçta 1-2 dk yükleniyor. Bu iş /api/v1/health'i düzenli pingleyerek
# instance'ı uyanık tutar. Ping'in kendisi uyuyan servisi de UYANDIRIR.
#
# Maliyet: repo PUBLIC → GitHub Actions dakikaları SINIRSIZ ($0).
# RAM: /health yalnızca ChromaDB.count() çağırır (bellekte zaten yüklü) →
#      ekstra RAM yok, 512 MB free tier'ı zorlamaz.
#
# NOT: GitHub zamanlı işleri yoğunlukta geciktirebilir (istenen aralık garanti
# değil). Kesintisiz uyanıklık istersen UptimeRobot / cron-job.org ile aynı URL'i
# 5 dk'da bir pingle (ücretsiz, render.yaml'da da öneriliyor) — bu ikisi birlikte
# kullanılabilir, çakışmaz.

on:
  workflow_dispatch:        # manuel tetikleme (Actions → Run workflow)
  schedule:
    - cron: '*/10 * * * *'  # ~10 dk'da bir (15 dk uyku eşiğine tampon)

# Eşzamanlı çalışmayı engelle — üst üste binen ping'ler runner israfı
concurrency:
  group: keep-alive
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint (uyuyorsa uyandırır)
        run: |
          URL="https://unisense-api.onrender.com/api/v1/health"
          echo "Pinging $URL"
          # -m 150: soğuk başlangıç (index HF'den iner + ONNX yüklenir) ~1-2 dk sürebilir
          # --retry: geçici 502/503 (uyanma anı) için birkaç deneme
          code=$(curl -sS -o /tmp/health.json -w '%{http_code}' \
                   -m 150 --retry 4 --retry-delay 15 --retry-all-errors "$URL" || echo "000")
          echo "HTTP $code"
          cat /tmp/health.json 2>/dev/null || true
          echo ""
          # 200 = sağlıklı. 503 = uyandı ama index henüz inmedi (yine de warm) → geçir.
          # 000 = hiç cevap yok (gerçek sorun) → fail et ki görünür olsun.
          if [ "$code" = "000" ]; then
            echo "::warning::Backend cevap vermedi (timeout/erişilemez)"
            exit 1
          fi
