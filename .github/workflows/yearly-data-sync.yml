name: Yearly YKS Data Sync

# YKS yerleştirme sonuçları her yıl Ağustos başında açıklanır.
# Bu workflow yılda 1 kez (15 Ağustos UTC 03:00) tetiklenir.
# Manuel tetikleme: GitHub Actions → "Yearly YKS Data Sync" → Run workflow.

on:
  schedule:
    # Ağustos-Ekim cumartesileri: YKS yerleştirme sonuçları Ağustos'ta açıklanır
    # ama tek atışlık cron (15 Ağu) kaçarsa 1 yıl telafi yoktu; haftalık koşu
    # idempotenttir (değişiklik yoksa commit atlanır).
    - cron: '0 3 * 8,9,10 6'
  workflow_dispatch:
    inputs:
      skip_scrape:
        description: 'Scrape adımlarını atla (sadece chunks+embed yeniden üret)'
        required: false
        default: 'false'

permissions:
  contents: write
  actions: write  # commit sonrası index-sync'i dispatch etmek için

concurrency:
  group: yearly-data-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 saat (full scrape uzun sürebilir)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Scrape — YÖK Atlas (lisans + önlisans)
        if: github.event.inputs.skip_scrape != 'true'
        working-directory: backend
        run: |
          python -m unisense.infrastructure.scrapers.yokatlas_scraper
          python -m unisense.infrastructure.scrapers.yokatlas_extra_scraper
        continue-on-error: false

      - name: Scrape — URAP
        if: github.event.inputs.skip_scrape != 'true'
        working-directory: backend
        run: python -m unisense.infrastructure.scrapers.urap_scraper
        continue-on-error: true

      - name: Scrape — Wikipedia üniversite metinleri
        if: github.event.inputs.skip_scrape != 'true'
        working-directory: backend
        run: python -m unisense.infrastructure.scrapers.wikipedia_uni_scraper
        continue-on-error: true

      - name: Scrape — Wikipedia infobox (website/logo/kuruluş)
        if: github.event.inputs.skip_scrape != 'true'
        working-directory: backend
        run: python -m unisense.infrastructure.scrapers.wikipedia_infobox_scraper
        continue-on-error: true

      - name: Transform — YÖK Atlas raw → processed
        if: github.event.inputs.skip_scrape != 'true'
        working-directory: backend
        run: python -m unisense.infrastructure.scrapers.transform_yokatlas

      - name: Enrich — Wikipedia infobox merge
        working-directory: backend
        run: python -m unisense.infrastructure.scrapers.enrich_universities

      - name: Enrich — Coğrafi metadata
        working-directory: backend
        run: python scripts/enrich_geo.py
        continue-on-error: true

      - name: Scrape — DGS yerleştirme tabanları (ÖSYM, yıllık)
        working-directory: backend
        run: python -m unisense.infrastructure.scrapers.dgs_scraper
        continue-on-error: true

      - name: Scrape — İŞKUR meslek rehberleri (RAG chunk kaynağı)
        working-directory: backend
        run: python -m unisense.infrastructure.scrapers.iskur_mbk_scraper
        continue-on-error: true

      - name: Build chunks
        working-directory: backend
        run: python -m unisense.cli.build_chunks

      - name: Commit data updates
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/data/raw backend/data/processed
          if git diff --staged --quiet; then
            echo "Hiç değişiklik yok, commit atlandı"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(data): yıllık YKS veri senkronizasyonu ($(date -u +%Y-%m-%d))

            - YÖK Atlas lisans + önlisans güncel
            - URAP + Wikipedia + İŞKUR güncel
            - RAG index rebuild'i index-sync workflow'u üstlenir
            "
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      # ESKİ VARSAYIM YANLIŞTI: 'deploy embed'i kendi çalıştırır' — Dockerfile
      # önce fetch_index dener ve HF'deki ESKİ index'i başarıyla indirir; yeni
      # veri RAG'e hiç ulaşmazdı. Doğru sıra (chunks→embed→HF upload→Render
      # hook) index-sync'te — bot push on:push'u ateşlemediği için AÇIKÇA çağır.
      - name: Trigger RAG Index Sync
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run index-sync.yml --repo "$GITHUB_REPOSITORY"
