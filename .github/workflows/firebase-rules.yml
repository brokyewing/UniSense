name: Deploy Firebase Rules

# Firestore kuralları değişince otomatik deploy eder.
# Console'daki kural ile repo'daki kuralın ayrışmasını engeller.
#
# NOT: Storage kuralları deploy EDİLMİYOR — Firebase Storage yeni projelerde
# Blaze (ücretli) plan istiyor, proje Spark'ta. Avatar yükleme de frontend'den
# kaldırıldı (hazır avatarlar kullanılıyor). Blaze'e geçilirse: Console'da
# Storage'ı kur, firebase.json'a storage bloğunu geri ekle, --only'ye
# ",storage" ekle (storage.rules repoda hazır bekliyor).
#
# Kurulum (bir kez):
# 1. Firebase Console → Project Settings → Service Accounts → Generate new private key
# 2. İndirilen JSON'un TAMAMINI GitHub repo secret'ı olarak ekle:
#    Settings → Secrets and variables → Actions → New secret
#    - FIREBASE_SERVICE_ACCOUNT: <json içeriği>
#    - FIREBASE_PROJECT_ID: <proje id>

on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'storage.rules'
      - 'firebase.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Write service account credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT secret tanımlı değil — workflow README'sindeki kurulum adımlarına bak."
            exit 1
          fi
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-sa.json

      - name: Deploy Firestore rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
        run: |
          npx firebase-tools deploy \
            --only firestore:rules \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --non-interactive

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/firebase-sa.json
