# Render — Backend deploy konfigürasyonu (FREE tier, $0/ay)
# Kullanım: Render dashboard → New → Blueprint → bu repo + branch seç
# (Blueprint bu dosyayı SADECE repo kökünde arar — backend/ altına taşıma!)
#
# ÖN KOŞULLAR:
# 1. Index HF dataset deposunda olmalı: python scripts/upload_index_hf.py <kullanici>/unisense-index
# 2. "sync: false" alanları (GEMINI_API_KEYS, FIREBASE_PROJECT_ID) Render UI'de elle gir.
# 3. Free instance 15 dk boşta kalınca uyur — UptimeRobot ile /api/v1/health'i
#    5 dk'da bir pingle (uyanma ~1-2 dk sürer: index HF'den iner + ONNX yüklenir).
#
# NOT: Embedding lokal ONNX (torch yok) → toplam RAM ~300-400MB, free'nin
# 512MB'ına sığar. Trafik artarsa tek satırla plan: starter ($7) yapılır.

services:
  - type: web
    name: unisense-api
    runtime: docker
    repo: https://github.com/BrokyEwing/UniSense
    branch: main
    region: frankfurt   # Türkiye'ye yakın, düşük latency
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    autoDeploy: true
    healthCheckPath: /api/v1/health

    envVars:
      - key: APP_ENV
        value: production
      - key: APP_HOST
        value: 0.0.0.0
      - key: APP_PORT
        value: "8002"
      # Free tier'da kalıcı disk yok — index container FS'ine HF'den indirilir
      - key: CHROMA_PERSIST_DIR
        value: /app/data/embeddings/chromadb
      - key: HF_INDEX_REPO
        value: BrokyEwing/unisense-index
      - key: CHROMA_COLLECTION
        value: unisense
      - key: EMBEDDING_PROVIDER
        value: local
      - key: GEMINI_MODEL_FAST
        value: gemini-2.5-flash-lite
      # Kimlik doğrulama: Firebase ID token (SPA'ya gizli key gömülemez;
      # frontend Authorization: Bearer <idToken> gönderir)
      - key: SECURITY_REQUIRE_AUTH
        value: "true"
      - key: SECURITY_REQUIRE_API_KEY
        value: "false"
      - key: RATE_LIMIT_ASK
        value: "20"
      - key: RATE_LIMIT_DEFAULT
        value: "60"
      # DİKKAT: gerçek Vercel domaini TİRELİ çıktı (uni-sense), ikisi de kalsın
      - key: CORS_ALLOWED_ORIGINS
        value: https://uni-sense.vercel.app,https://unisense.vercel.app
      # Hassas / ortama özgü — Render UI'de elle gir:
      - key: GEMINI_API_KEYS
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
